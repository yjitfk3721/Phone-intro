<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone 17 Pro Max Hero</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="device" aria-label="iPhone 17 Pro Max 产品页">
      <section class="hero" aria-labelledby="product-title">
        <p class="eyebrow">Cosmic Orange</p>

        <div class="product-visual" aria-label="iPhone 17 Pro Max 产品视觉">
          <div class="phone-back">
            <div class="camera-island">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>

        <div class="hero-copy">
          <h1 id="product-title">iPhone 17 Pro Max</h1>
          <p>为高强度创作、游戏和全天候移动使用而生。</p>
        </div>

        <div class="cta-row" aria-label="产品操作">
          <button class="primary-cta" type="button" data-scroll-target="specs">
            了解更多
          </button>
          <button class="secondary-cta" type="button" data-scroll-target="specs">
            查看参数
          </button>
        </div>
      </section>

      <section class="specs" id="specs" aria-labelledby="specs-title">
        <p class="section-kicker">Tech Specs</p>
        <h2 id="specs-title">更大屏幕，更长续航，更完整的 Pro 体验。</h2>
        <p class="specs-intro">
          Cosmic Orange 机身在深色背景中呈现温润金属反射，A19 Pro、ProMotion
          显示屏与 Pro Fusion 影像系统共同组成旗舰体验。
        </p>
        <dl>
          <dt>显示屏</dt>
          <dd>6.9 英寸 ProMotion 全天候显示</dd>
          <dt>芯片</dt>
          <dd>A19 Pro，面向游戏、影像和 AI 任务</dd>
          <dt>影像</dt>
          <dd>Pro Fusion 摄像头系统，覆盖广角与长焦</dd>
          <dt>容量</dt>
          <dd>256GB / 512GB / 1TB</dd>
        </dl>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
