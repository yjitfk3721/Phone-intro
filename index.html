<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone 17 Pro Max</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="device" aria-label="iPhone 17 Pro Max 产品页">
      <section class="hero" aria-labelledby="product-title">
        <h1 id="product-title" class="sr-only">iPhone 17 Pro Max</h1>
        <img
          class="hero-image"
          src="assets/iphone-hero-reference.jpg"
          alt="Cosmic Orange iPhone 17 Pro Max"
        />

        <div class="hit-area" aria-label="产品操作">
          <button class="cta cta-more" type="button" data-scroll-target="specs">
            了解更多
          </button>
          <button class="cta cta-specs" type="button" data-scroll-target="specs">
            查看参数
          </button>
        </div>
      </section>

      <section class="specs" id="specs" aria-labelledby="specs-title">
        <p class="section-kicker">Tech Specs</p>
        <h2 id="specs-title">核心参数</h2>
        <dl>
          <dt>显示屏</dt>
          <dd>6.9 英寸 ProMotion 全天候显示</dd>
          <dt>芯片</dt>
          <dd>A19 Pro，面向游戏、影像和 AI 任务</dd>
          <dt>影像</dt>
          <dd>Pro Fusion 摄像头系统，覆盖广角与长焦</dd>
          <dt>容量</dt>
          <dd>256GB / 512GB / 1TB</dd>
        </dl>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
